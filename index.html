<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blockchain Core | Web3 Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep:   #0d0d1a;
  --bg-mid:    #1a1a2a;
  --block:     #00cc88;
  --chain:     #ffaa00;
  --crypto:    #aa66ff;
  --hash:      #ff66aa;
  --text:      #ffffff;
  --dim:       rgba(255,255,255,0.7);
}

html, body {
  width: 100%; height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  overflow-x: hidden;
}

.hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2a 100%);
}

/* Blockchain grid */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0, 204, 136, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 204, 136, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: perspective(800px) rotateX(60deg);
  transform-origin: top;
  animation: gridMove 15s linear infinite;
}

@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 40px 40px; }
}

nav {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 60px;
  background: rgba(10, 10, 26, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0, 204, 136, 0.2);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 800;
  font-size: 1.3rem;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--block), var(--chain));
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}

.logo-icon::before {
  content: '';
  position: absolute;
  inset: 2px;
  background: var(--bg-deep);
  border-radius: 6px;
}

.logo-icon::after {
  content: '⧉';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--block);
  font-size: 1.2rem;
  font-weight: 400;
}

.nav-links {
  display: flex;
  gap: 40px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--dim);
  transition: 0.3s;
}

.nav-links a:hover, .nav-links a.active {
  color: var(--block);
  text-shadow: 0 0 10px var(--block);
}

.nav-links a.active::after {
  content: '';
  display: block;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--block), var(--chain));
  margin-top: 4px;
}

.content {
  position: relative;
  z-index: 5;
  flex: 1;
  display: flex;
  align-items: center;
  padding: 20px 60px;
  gap: 60px;
}

.copy {
  flex: 0 0 450px;
}

.copy h1 {
  font-size: clamp(2.5rem, 4.5vw, 4.5rem);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 20px;
}

.gradient-text {
  background: linear-gradient(135deg, var(--block), var(--chain));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.copy p {
  color: var(--dim);
  font-size: 1rem;
  line-height: 1.8;
  margin-bottom: 40px;
  max-width: 380px;
}

.cta-row {
  display: flex;
  gap: 16px;
}

.btn {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  border: none;
  border-radius: 8px;
  padding: 14px 32px;
  cursor: pointer;
  transition: 0.3s;
  letter-spacing: 0.05em;
}

.btn-primary {
  background: linear-gradient(135deg, var(--block), var(--chain));
  color: #000;
  box-shadow: 0 0 30px rgba(0, 204, 136, 0.5);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(255, 170, 0, 0.6);
}

.btn-outline {
  background: transparent;
  color: var(--block);
  border: 2px solid var(--block);
}

.btn-outline:hover {
  background: rgba(0, 204, 136, 0.1);
  border-color: var(--chain);
  color: var(--chain);
}

/* 3D Blockchain Visual */
.visual {
  flex: 1;
  height: 500px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.blockchain-scene {
  width: 500px;
  height: 500px;
  position: relative;
  transform-style: preserve-3d;
  animation: sceneFloat 10s ease-in-out infinite;
}

@keyframes sceneFloat {
  0%, 100% { transform: rotateY(0deg) rotateX(5deg) translateY(0); }
  50% { transform: rotateY(10deg) rotateX(8deg) translateY(-15px); }
}

/* Blocks */
.block {
  position: absolute;
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, rgba(0, 204, 136, 0.9), rgba(255, 170, 0, 0.9));
  border-radius: 12px;
  transform-style: preserve-3d;
  box-shadow: 0 0 50px rgba(0, 204, 136, 0.3);
  animation: blockGlow 3s ease-in-out infinite;
}

@keyframes blockGlow {
  0%, 100% { box-shadow: 0 0 50px rgba(0, 204, 136, 0.3); }
  50% { box-shadow: 0 0 80px rgba(255, 170, 0, 0.5); }
}

.block-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
}

.block-front { transform: translateZ(40px); background: rgba(0, 204, 136, 0.8); }
.block-back { transform: rotateY(180deg) translateZ(40px); background: rgba(255, 170, 0, 0.8); }
.block-right { transform: rotateY(90deg) translateZ(40px); width: 80px; background: linear-gradient(135deg, #00cc88, #ffaa00); }
.block-left { transform: rotateY(-90deg) translateZ(40px); width: 80px; background: linear-gradient(135deg, #ffaa00, #00cc88); }
.block-top { transform: rotateX(90deg) translateZ(40px); height: 80px; background: rgba(255, 255, 255, 0.2); }
.block-bottom { transform: rotateX(-90deg) translateZ(40px); height: 80px; background: rgba(0, 0, 0, 0.3); }

/* Chain links */
.chain-link {
  position: absolute;
  height: 4px;
  background: linear-gradient(90deg, var(--block), var(--chain));
  transform-origin: 0 0;
  border-radius: 2px;
  opacity: 0.6;
  animation: linkPulse 2s ease-in-out infinite;
}

@keyframes linkPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Hash particles */
.hash-particle {
  position: absolute;
  color: var(--hash);
  font-family: monospace;
  font-size: 0.8rem;
  white-space: nowrap;
  transform-style: preserve-3d;
  animation: hashFloat 4s linear infinite;
}

@keyframes hashFloat {
  from { transform: translateZ(100px) translateY(0); opacity: 1; }
  to { transform: translateZ(-100px) translateY(-100px); opacity: 0; }
}

/* Transaction nodes */
.tx-node {
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--crypto);
  border-radius: 50%;
  box-shadow: 0 0 20px var(--crypto);
  animation: txPulse 2s ease-in-out infinite;
}

@keyframes txPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.5); }
}

/* Stats */
.stats-panel {
  position: absolute;
  bottom: 40px;
  left: 40px;
  z-index: 20;
  display: flex;
  gap: 20px;
}

.stat-card {
  background: rgba(0, 204, 136, 0.1);
  border: 1px solid rgba(0, 204, 136, 0.3);
  padding: 15px 25px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.stat-number {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--block);
  line-height: 1;
}

.stat-label {
  font-size: 0.7rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Responsive */
@media (max-width: 1000px) {
  nav { padding: 20px 30px; }
  .content { flex-direction: column; padding: 20px 30px; }
  .copy { max-width: 100%; flex: unset; }
  .visual { width: 100%; height: 400px; }
  .blockchain-scene { transform: scale(0.7); }
}
</style>
</head>
<body>
<section class="hero">
  <div class="grid-overlay"></div>

  <nav>
    <div class="logo">
      <div class="logo-icon"></div>
      BLOCK<span style="color: var(--block);">CHAIN</span>
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Blocks</a></li>
      <li><a href="#">Transactions</a></li>
      <li><a href="#">Staking</a></li>
      <li><a href="#">Governance</a></li>
    </ul>
  </nav>

  <div class="content">
    <div class="copy">
      <h1>
        <span class="gradient-text">Decentralized</span><br>
        Future of<br>
        Finance
      </h1>
      <p>Next-generation blockchain with 100,000 TPS, near-zero fees, and full Ethereum compatibility.</p>
      <div class="cta-row">
        <button class="btn btn-primary">Connect Wallet</button>
        <button class="btn btn-outline">View Explorer</button>
      </div>
    </div>

    <div class="visual">
      <div class="blockchain-scene" id="blockchainScene"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-panel">
    <div class="stat-card">
      <div class="stat-number">1.2B</div>
      <div class="stat-label">Total TX</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">843K</div>
      <div class="stat-label">Wallets</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">2.1s</div>
      <div class="stat-label">Block Time</div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('blockchainScene');
    
    // Create blocks in a chain
    const blockPositions = [
      { x: -100, y: -50, z: 0 },
      { x: 0, y: 0, z: 50 },
      { x: 100, y: 50, z: 0 },
      { x: 50, y: -30, z: -50 },
      { x: -50, y: 30, z: 100 },
      { x: -150, y: 20, z: -50 },
      { x: 150, y: -20, z: -100 }
    ];

    blockPositions.forEach((pos, index) => {
      const block = document.createElement('div');
      block.className = 'block';
      block.style.transform = `translate3d(${pos.x}px, ${pos.y}px, ${pos.z}px)`;
      block.style.animationDelay = `-${index * 0.5}s`;
      
      // Add faces
      ['front', 'back', 'right', 'left', 'top', 'bottom'].forEach(face => {
        const faceEl = document.createElement('div');
        faceEl.className = `block-face block-${face}`;
        block.appendChild(faceEl);
      });
      
      scene.appendChild(block);

      // Add chain links between blocks
      if (index < blockPositions.length - 1) {
        const next = blockPositions[index + 1];
        const link = document.createElement('div');
        link.className = 'chain-link';
        
        const dx = next.x - pos.x;
        const dy = next.y - pos.y;
        const dz = next.z - pos.z;
        const length = Math.sqrt(dx*dx + dy*dy + dz*dz);
        
        link.style.width = length + 'px';
        link.style.transform = `translate3d(${pos.x}px, ${pos.y}px, ${pos.z}px) rotateX(${Math.atan2(dy, Math.sqrt(dx*dx+dz*dz))}rad) rotateY(${Math.atan2(dz, dx)}rad)`;
        link.style.animationDelay = `-${index * 0.3}s`;
        
        scene.appendChild(link);
      }
    });

    // Add transaction nodes
    for (let i = 0; i < 30; i++) {
      const node = document.createElement('div');
      node.className = 'tx-node';
      
      const angle = (i / 30) * Math.PI * 2;
      const radius = 200;
      const height = Math.sin(angle * 3) * 100;
      
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius * 0.5;
      const z = Math.sin(angle) * radius;
      
      node.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
      node.style.animationDelay = `-${i * 0.1}s`;
      
      scene.appendChild(node);
    }

    // Add hash particles
    const hashes = ['0x3f5a...', '0x8b2c...', '0x1e9d...', '0x7a4b...', '0x2c8f...'];
    for (let i = 0; i < 15; i++) {
      const hash = document.createElement('div');
      hash.className = 'hash-particle';
      hash.textContent = hashes[i % hashes.length];
      
      const angle = Math.random() * Math.PI * 2;
      const radius = 150;
      
      hash.style.left = 50 + Math.cos(angle) * radius + 'px';
      hash.style.top = 50 + Math.sin(angle) * radius + 'px';
      hash.style.transform = `translateZ(${Math.random() * 200}px)`;
      hash.style.animationDelay = `-${Math.random() * 3}s`;
      
      scene.appendChild(hash);
    }
  </script>
</section>
</body>
</html>
